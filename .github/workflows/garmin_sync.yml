name: Garmin Sync

on:
  schedule:
    # Cada 3 horas (UTC) — ajustado a hora España:
    # 05:00, 08:00, 11:00, 14:00, 17:00, 20:00, 23:00 UTC
    - cron: '0 */3 * * *'
  workflow_dispatch:  # permite lanzarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar garminconnect
        run: pip install garminconnect

      - name: Ejecutar sync
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin_sync_v8.py

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin_historial.json
          git diff --staged --quiet || git commit -m "chore: Garmin sync $(date +'%Y-%m-%d %H:%M')"
          git push
